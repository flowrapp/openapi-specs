components:
  schemas:
    WorkerBusinessResponseDTO:
      type: object
      description: Business information from the worker's perspective
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the business
          example: 101
        name:
          type: string
          description: Name of the business
          example: "Coffee Time"
        zone:
          type: string
          description: IANA time zone identifier for the business
          example: "Europe/Madrid"
        address:
          type: string
          description: Street address of the business
          example: "C/ Gran Vía 43"
        town:
          type: string
          description: Town of the business
          example: "Barbate"
        city:
          type: string
          description: City of the business
          example: "Cádiz"
        country:
          type: string
          description: Country of the business
          example: "España"
        location:
          $ref: '../common/components.yml#/components/schemas/LocationDTO'
        userRole:
          type: string
          description: Role of the current user in this business
          enum: [OWNER, MANAGER, EMPLOYEE]
          example: "EMPLOYEE"
      required:
        - id
        - name
        - zone
        - address
        - town
        - city
        - country
        - location
        - userRole

    ClockViewResponseDTO:
      type: object
      description: >
        Aggregated clock view for the worker's current day. Combines today's work sessions,
        the currently active session (if any), and running totals for the week and month.
      properties:
        date:
          type: string
          format: date
          description: The date this clock view represents
          example: "2025-07-29"
        activeWorklog:
          description: The currently open/active work session (null if the worker is clocked out)
          oneOf:
            - $ref: '../common/components.yml#/components/schemas/SessionDTO'
            - type: 'null'
        sessions:
          type: array
          description: All completed work sessions for this date
          items:
            $ref: '../common/components.yml#/components/schemas/SessionDTO'
        totalSecondsWeek:
          type: integer
          format: int64
          description: Total seconds worked in the current ISO week
          example: 129600
        totalSecondsMonth:
          type: integer
          format: int64
          description: Total seconds worked in the current calendar month
          example: 504000
      required:
        - date
        - sessions
        - totalSecondsWeek
        - totalSecondsMonth

    ClockInRequestDTO:
      type: object
      description: Request to clock in (start a work session)
      properties:
        clockIn:
          type: string
          format: date-time
          description: Optional clock-in timestamp. Server uses current time if omitted.
          example: "2025-07-29T08:30:00+02:00"

    ClockOutRequestDTO:
      type: object
      description: Request to clock out (end a work session)
      properties:
        clockOut:
          type: string
          format: date-time
          description: Optional clock-out timestamp. Server uses current time if omitted.
          example: "2025-07-29T17:30:00+02:00"

    WorkerDayHistoryResponseDTO:
      type: object
      description: Detailed work history for a single day, including all individual sessions
      properties:
        date:
          type: string
          format: date
          description: The date of this history entry
          example: "2025-03-10"
        totalSeconds:
          type: integer
          format: int64
          description: Total seconds worked on this date
          example: 30600
        sessions:
          type: array
          description: Individual work sessions for this date
          items:
            $ref: '../common/components.yml#/components/schemas/SessionDTO'
      required:
        - date
        - totalSeconds
        - sessions

    WorkerWeekHistoryResponseDTO:
      type: object
      description: Work history summary for an ISO week, with per-day breakdown including sessions
      properties:
        week:
          type: string
          description: ISO 8601 week identifier
          pattern: '^\d{4}-W\d{2}$'
          example: "2025-W31"
        totalSeconds:
          type: integer
          format: int64
          description: Total seconds worked in this week
          example: 144000
        totalSessions:
          type: integer
          format: int32
          description: Total number of work sessions in this week
          example: 8
        days:
          type: array
          description: Per-day breakdown for the week
          items:
            $ref: '#/components/schemas/WorkerWeekDayDTO'
      required:
        - week
        - totalSeconds
        - totalSessions
        - days

    WorkerWeekDayDTO:
      type: object
      description: A single day within a week history, including session details
      properties:
        date:
          type: string
          format: date
          description: The date
          example: "2025-07-28"
        totalSeconds:
          type: integer
          format: int64
          description: Total seconds worked on this day
          example: 28800
        sessions:
          type: array
          description: Work sessions for this day
          items:
            $ref: '../common/components.yml#/components/schemas/SessionDTO'
      required:
        - date
        - totalSeconds
        - sessions

    WorkerMonthHistoryResponseDTO:
      type: object
      description: >
        Work history calendar for a month. Returns day-level totals only (no session detail).
        Use the day history endpoint to drill into a specific day.
      properties:
        month:
          type: string
          description: Year and month in YYYY-MM format
          pattern: '^\d{4}-\d{2}$'
          example: "2025-03"
        totalSeconds:
          type: integer
          format: int64
          description: Total seconds worked in this month
          example: 237600
        totalSessions:
          type: integer
          format: int32
          description: Total number of work sessions in this month
          example: 22
        days:
          type: array
          description: Per-day summary for the month
          items:
            $ref: '#/components/schemas/WorkerMonthDayDTO'
      required:
        - month
        - totalSeconds
        - totalSessions
        - days

    WorkerMonthDayDTO:
      type: object
      description: A single day within a month history (totals only, no session detail)
      properties:
        date:
          type: string
          format: date
          description: The date
          example: "2025-03-01"
        totalSeconds:
          type: integer
          format: int64
          description: Total seconds worked on this day
          example: 28800
      required:
        - date
        - totalSeconds
