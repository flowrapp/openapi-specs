components:
  schemas:
    UserProfileResponseDTO:
      type: object
      description: Current authenticated user's profile information
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier of the user
          example: 1
        name:
          type: string
          description: Display name of the user
          example: "John Doe"
        email:
          type: string
          format: email
          description: Email address of the user
          example: "john.doe@example.com"
        phone:
          type: string
          description: Phone number of the user
          example: "+34612345678"
        role:
          type: string
          description: Global role of the user in the system
          enum: [ADMIN, USER]
          example: "USER"
      required:
        - id
        - name
        - email
        - role

    PasswordChangeRequestDTO:
      type: object
      description: Request object for changing the user's password
      properties:
        password:
          type: string
          description: New password
          format: password
          example: "newSecurePassword123"
      required:
        - password
