pushTokens:
  push-tokens:
    post:
      summary: Register push notification token
      description: Registers a device push notification token for the authenticated user. Pass-through to the main API.
      tags:
        - Push Tokens
      operationId: registerPushToken
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/pushTokens/components.yml#/components/schemas/PushTokenRequestDTO'
      responses:
        '201':
          description: Push token registered successfully
        '400':
          description: Invalid request
        '401':
          description: Unauthorized

  deletion:
    delete:
      summary: Delete push notification token
      description: Deletes a device push notification token for the authenticated user. Pass-through to the main API.
      tags:
        - Push Tokens
      operationId: deletePushToken
      security:
        - bearerAuth: []
      parameters:
        - name: deviceId
          in: path
          required: true
          description: Unique identifier of the device
          schema:
            type: string
      responses:
        '200':
          description: Push token deleted successfully
        '401':
          description: Unauthorized
        '404':
          description: Push token not found for this device
