auth:
  login:
    post:
      summary: Authenticate a user
      description: >
        Authenticates a user by validating their email and password credentials.
        Returns access and refresh tokens for subsequent API requests.
        This is a pass-through to the main API.
      tags:
        - Authentication
      operationId: login
      security: []
      requestBody:
        description: User credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/auth/components.yml#/components/schemas/LoginRequestDTO'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '../../components/auth/components.yml#/components/schemas/TokenResponseDTO'
        '401':
          description: Invalid credentials

  token-refresh:
    post:
      summary: Refresh authentication tokens
      description: >
        Renews authentication by generating new access and refresh tokens using a valid refresh token.
        Pass-through to the main API.
      tags:
        - Authentication
      operationId: refreshToken
      security: []
      requestBody:
        description: Refresh token
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/auth/components.yml#/components/schemas/RefreshRequestDTO'
      responses:
        '200':
          description: Token refresh successful
          content:
            application/json:
              schema:
                $ref: '../../components/auth/components.yml#/components/schemas/TokenResponseDTO'
        '401':
          description: Invalid or expired refresh token

  forgot-password:
    post:
      summary: Request a password reset
      description: >
        Requests a six-digit password reset code by email. The response does not reveal
        whether the email is registered. Pass-through to the main API.
      tags:
        - Authentication
      operationId: forgotPassword
      security: []
      requestBody:
        description: Email address for password recovery
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/auth/components.yml#/components/schemas/ForgotPasswordRequestDTO'
      responses:
        '202':
          description: Password reset request accepted
        '400':
          description: Invalid request
        '429':
          description: Too many password reset requests

  reset-password:
    post:
      summary: Reset a forgotten password
      description: >
        Sets a new password using the six-digit verification code sent to the user's
        email address. Pass-through to the main API.
      tags:
        - Authentication
      operationId: resetPassword
      security: []
      requestBody:
        description: Password reset details
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/auth/components.yml#/components/schemas/ResetPasswordRequestDTO'
      responses:
        '204':
          description: Password reset successfully
        '400':
          description: Invalid request, verification code, or password
        '429':
          description: Too many verification attempts

  github:
    post:
      summary: Authenticate via GitHub OAuth
      description: >
        Exchanges a GitHub OAuth authorization code for Flowrapp access and refresh tokens.
        Pass-through to the main API.
      tags:
        - Authentication
      operationId: oauthGithub
      security: []
      requestBody:
        description: GitHub OAuth credential
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/auth/components.yml#/components/schemas/OAuthCredentialRequestDTO'
      responses:
        '200':
          description: OAuth authentication successful
          content:
            application/json:
              schema:
                $ref: '../../components/auth/components.yml#/components/schemas/TokenResponseDTO'
        '401':
          description: Invalid OAuth credential

  google:
    post:
      summary: Authenticate via Google OAuth
      description: >
        Exchanges a Google OAuth credential (ID token) for Flowrapp access and refresh tokens.
        Pass-through to the main API.
      tags:
        - Authentication
      operationId: oauthGoogle
      security: []
      requestBody:
        description: Google OAuth credential
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/auth/components.yml#/components/schemas/OAuthCredentialRequestDTO'
      responses:
        '200':
          description: OAuth authentication successful
          content:
            application/json:
              schema:
                $ref: '../../components/auth/components.yml#/components/schemas/TokenResponseDTO'
        '401':
          description: Invalid OAuth credential

  register-from-invitation:
    post:
      summary: Register user from invitation
      description: >
        Registers a new user and accepts the invitation associated with the token.
        This is a pass-through to the main API.
      tags:
        - Authentication
      operationId: registerUserFromInvitation
      security: []
      parameters:
        - name: token
          in: query
          required: true
          description: Human-readable invitation code or legacy UUID from the invitation email
          schema:
            type: string
            pattern: '^(?:[2-9A-HJ-NP-Z]{8}|[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})$'
            example: 7K3M9XQ2
      requestBody:
        description: Registration details for the new user
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/auth/components.yml#/components/schemas/RegisterUserFromInvitationRequestDTO'
            example:
              username: "johndoe"
              phone: "+1234567890"
              password: "securePassword123"
      responses:
        '201':
          description: User registered and invitation accepted successfully
        '403':
          description: Invitation expired
        '404':
          description: Invitation token not found
        '409':
          description: User is already registered
