user:
  profile:
    get:
      summary: Get current user profile
      description: >
        Returns the profile of the currently authenticated user, including their name,
        email, phone, and global system role.
      tags:
        - User
      operationId: getCurrentUserProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../../components/user/components.yml#/components/schemas/UserProfileResponseDTO'
        '401':
          description: Unauthorized

  change-password:
    put:
      summary: Change current user's password
      description: Updates the password for the currently authenticated user.
      tags:
        - User
      operationId: changeCurrentUserPassword
      security:
        - bearerAuth: []
      requestBody:
        description: New password
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/user/components.yml#/components/schemas/PasswordChangeRequestDTO'
      responses:
        '200':
          description: Password changed successfully
        '400':
          description: Invalid password format
        '401':
          description: Unauthorized
