components:
  schemas:
    LoginRequestDTO:
      type: object
      description: Request object for user login
      properties:
        username:
          type: string
          description: Username for authentication
          example: user
        password:
          type: string
          description: Password for authentication
          example: pass
      required:
        - username
        - password
    TokenResponseDTO:
      type: object
      description: Response object containing authentication tokens
      properties:
        accessToken:
          type: string
          description: JWT access token
          example: eyJhbGciOiJIUzI1NiIs...
        refreshToken:
          type: string
          description: Refresh token for obtaining new access tokens
          example: d8a1fef4-234d-4c2b-bd7a-...
    RefreshRequestDTO:
      type: object
      description: Request object for token refresh
      properties:
        refreshToken:
          type: string
          description: Refresh token for obtaining new access tokens
          example: d8a1fef4-234d-4c2b-bd7a-...
      required:
        - refreshToken
    ForgotPasswordRequestDTO:
      type: object
      description: Request object for starting password recovery
      properties:
        email:
          type: string
          format: email
          description: Email address associated with the account
          example: user@example.com
      required:
        - email
    ResetPasswordRequestDTO:
      type: object
      description: Request object for resetting a password with an email verification code
      properties:
        email:
          type: string
          format: email
          description: Email address associated with the password recovery request
          example: user@example.com
        code:
          type: string
          pattern: '^[0-9]{6}$'
          description: Six-digit, single-use verification code sent by email
          example: "123456"
        password:
          type: string
          format: password
          description: New password for the user
          example: "newSecurePassword123"
      required:
        - email
        - code
        - password
    OAuthCredentialRequestDTO:
      type: object
      description: Request object containing a third-party OAuth credential (e.g., Google ID token or GitHub OAuth credential)
      properties:
        credential:
          type: string
          description: The credential string obtained from the OAuth provider
          example: eyJhbGciOiJSUzI1NiIsImtpZCI6IjE2MjM0NTY3ODkwIn0...
      required:
        - credential
