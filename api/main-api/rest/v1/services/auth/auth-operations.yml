auth:
  login:
    post:
      summary: Authenticate a user
      description: Authenticates a user by validating their username and password credentials. Upon successful
        authentication, it generates and returns access and refresh tokens that can be used for 
        subsequent authorized API requests.
      tags:
        - Authentication
      operationId: login
      security: []
      requestBody:
        description: User credentials
        content:
          application/json:
            schema:
              "$ref": '../../components/auth/auth-components.yml#/components/schemas/LoginRequestDTO'
        required: true
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                "$ref": "../../components/auth/auth-components.yml#/components/schemas/TokenResponseDTO"
        '401':
          description: Authentication failed
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                INVALID_CREDENTIALS:
                  summary: "1003 - invalid credentials"
                  value:
                    status: 401
                    detail: "1003 - invalid credentials"
      x-functional-errors:
        - 1003

  token-refresh:
    post:
      summary: Refresh authentication tokens
      description: Renews authentication by generating new access and refresh tokens using a valid refresh token.
      tags:
        - Authentication
      operationId: refreshToken
      security: []
      requestBody:
        description: Refresh token
        content:
          application/json:
            schema:
              "$ref": '../../components/auth/auth-components.yml#/components/schemas/RefreshRequestDTO'
        required: true
      responses:
        '200':
          description: Token refresh successful
          content:
            application/json:
              schema:
                "$ref": "../../components/auth/auth-components.yml#/components/schemas/TokenResponseDTO"
        '401':
          description: Invalid or expired refresh token
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                INVALID_REFRESH_TOKEN:
                  summary: "1004 - invalid refresh token"
                  value:
                    status: 401
                    detail: "1004 - invalid refresh token"
        '404':
          description: User not found
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                USER_NOT_FOUND:
                  summary: "1000 - user not found"
                  value:
                    status: 404
                    detail: "1000 - user not found"
      x-functional-errors:
        - 1000
        - 1004

  github:
    post:
      summary: Authenticate via GitHub OAuth
      description: Exchanges a GitHub OAuth authorization code for Flowrapp access and refresh tokens.
      tags:
        - Authentication
      operationId: oauthGithub
      security: []
      requestBody:
        description: GitHub OAuth credential
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/auth/auth-components.yml#/components/schemas/OAuthCredentialRequestDTO'
      responses:
        '200':
          description: OAuth authentication successful
          content:
            application/json:
              schema:
                $ref: '../../components/auth/auth-components.yml#/components/schemas/TokenResponseDTO'
        '401':
          description: Invalid OAuth credential
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                OAUTH2_INVALID_TOKEN:
                  summary: "1023 - oauth2 token is invalid"
                  value:
                    status: 401
                    detail: "1023 - oauth2 token is invalid"
      x-functional-errors:
        - 1023

  google:
    post:
      summary: Authenticate via Google OAuth
      description: Exchanges a Google OAuth credential (such as an ID token or authorization code) for Flowrapp access and refresh tokens.
      tags:
        - Authentication
      operationId: oauthGoogle
      security: []
      requestBody:
        description: Google OAuth credential
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/auth/auth-components.yml#/components/schemas/OAuthCredentialRequestDTO'
      responses:
        '200':
          description: OAuth authentication successful
          content:
            application/json:
              schema:
                $ref: '../../components/auth/auth-components.yml#/components/schemas/TokenResponseDTO'
        '401':
          description: Invalid OAuth credential
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                OAUTH2_INVALID_TOKEN:
                  summary: "1023 - oauth2 token is invalid"
                  value:
                    status: 401
                    detail: "1023 - oauth2 token is invalid"
      x-functional-errors:
        - 1023
