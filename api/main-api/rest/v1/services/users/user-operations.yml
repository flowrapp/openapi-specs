users:
  byName:
    post:
      summary: Find a user by name
      description: Searches for and retrieves a user profile based on the provided name.
      tags:
        - Users
      operationId: getUser
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        description: User information to search for
        content:
          application/json:
            schema:
              "$ref": '../../components/users/components.yml#/components/schemas/UserRequestDTO'
        required: true
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                "$ref": "../../components/users/components.yml#/components/schemas/UserResponseDTO"
        '404':
          description: User not found
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                USER_NOT_FOUND:
                  summary: "1000 - user not found"
                  value:
                    status: 404
                    detail: "1000 - user not found"
      x-functional-errors:
        - 1000

  change-password:
    put:
      summary: Change user password
      description: Updates the password for the authenticated user.
      tags:
        - Users
      operationId: changePassword
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        description: New password information
        content:
          application/json:
            schema:
              "$ref": '../../components/users/components.yml#/components/schemas/PasswordChangeRequestDTO'
        required: true
      responses:
        '200':
          description: Password changed successfully
        '400':
          description: User auth provider not found
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                USER_AUTH_PROVIDER_NOT_FOUND:
                  summary: "1024 - user auth provider not found"
                  value:
                    status: 400
                    detail: "1024 - user auth provider not found"
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - User does not have permission to change this password
        '404':
          description: User not found
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                USER_NOT_FOUND:
                  summary: "1000 - user not found"
                  value:
                    status: 404
                    detail: "1000 - user not found"
      x-functional-errors:
        - 1000
        - 1024
