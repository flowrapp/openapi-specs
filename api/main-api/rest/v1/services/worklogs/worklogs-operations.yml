worklogs:
  clock-in:
    post:
      summary: Register start of workday
      description: Records the start time of a work session for the authenticated user at a specific business location.
      tags:
        - Worklogs
      operationId: clockIn
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          description: ID of the business
          schema:
            type: integer
            format: int64
      requestBody:
        description: Clock-in information (optional)
        content:
          application/json:
            schema:
              $ref: '../../components/worklogs/components.yml#/components/schemas/ClockInRequestDTO'
        required: false
      responses:
        '200':
          description: Clock-in successful
          content:
            application/json:
              schema:
                $ref: '../../components/worklogs/components.yml#/components/schemas/WorkLogResponseDTO'
        '401':
          description: Unauthorized
        '404':
          description: Business not found or user is not a member of the business
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                BUSINESS_NOT_FOUND:
                  summary: "1006 - business does not exist"
                  value:
                    status: 404
                    detail: "1006 - business does not exist"
      x-functional-errors:
        - 1006

  clock-out:
    put:
      summary: Close open worklog
      description: Finalizes an active work session by recording the end time for the authenticated user at a specific business location.
      tags:
        - Worklogs
      operationId: clockOut
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          description: ID of the business
          schema:
            type: integer
            format: int64
        - name: worklogId
          in: path
          required: true
          description: ID of the worklog to close
          schema:
            type: integer
            format: int64
      requestBody:
        description: Clock-out information (optional)
        content:
          application/json:
            schema:
              $ref: '../../components/worklogs/components.yml#/components/schemas/ClockOutRequestDTO'
        required: false
      responses:
        '200':
          description: Clock-out successful
          content:
            application/json:
              schema:
                $ref: '../../components/worklogs/components.yml#/components/schemas/WorkLogResponseDTO'
        '400':
          description: Worklog times are invalid (e.g. clock-out before clock-in)
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                WORKLOG_NOT_VALID:
                  summary: "1025 - worklog is not valid"
                  value:
                    status: 400
                    detail: "1025 - worklog is not valid"
        '401':
          description: Unauthorized
        '403':
          description: User is not the owner of the worklog or the worklog is already closed
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                WORKLOG_NOT_OWNER:
                  summary: "1019 - user is not the owner of worklog"
                  value:
                    status: 403
                    detail: "1019 - user is not the owner of worklog"
                WORKLOG_CLOSED:
                  summary: "1018 - worklog already closed"
                  value:
                    status: 403
                    detail: "1018 - worklog already closed"
        '404':
          description: Worklog not found
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                WORKLOG_NOT_FOUND:
                  summary: "1017 - worklog not found"
                  value:
                    status: 404
                    detail: "1017 - worklog not found"
        '409':
          description: Worklog overlaps with an existing worklog
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                WORKLOG_OVERLAP:
                  summary: "1022 - worklog overlaps with existing worklog"
                  value:
                    status: 409
                    detail: "1022 - worklog overlaps with existing worklog"
      x-functional-errors:
        - 1017
        - 1018
        - 1019
        - 1022
        - 1025

  filtered-worklogs:
    get:
      summary: Get filtered worklogs
      description: Retrieves a collection of worklog records for a specific business, filtered by various time-based and user criteria.
      tags:
        - Worklogs
      operationId: getWorklogs
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          description: ID of the business
          schema:
            type: integer
            format: int64
        - name: from
          in: query
          required: false
          description: Start date for filtering (format YYYY-MM-DD). UTC timezone is used.
          schema:
            type: string
            format: date
            example: "2025-07-22"
        - name: to
          in: query
          required: false
          description: End date for filtering (format YYYY-MM-DD). UTC timezone is used.
          schema:
            type: string
            format: date
            example: "2025-07-28"
        - name: date
          in: query
          required: false
          description: Specific date for filtering (alternative to from/to, format YYYY-MM-DD). UTC timezone is used.
          schema:
            type: string
            format: date
            example: "2025-07-29"
        - name: userId
          in: query
          required: false
          description: Filter by user ID
          schema:
            type: integer
            format: int64
            example: 123
      responses:
        '200':
          description: Worklogs retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../../components/worklogs/components.yml#/components/schemas/WorkLogResponseDTO'
        '401':
          description: Unauthorized
        '403':
          description: Current user is not the owner of the business
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                USER_NOT_OWNER_OF_BUSINESS:
                  summary: "1020 - user is not the owner of business"
                  value:
                    status: 403
                    detail: "1020 - user is not the owner of business"
        '404':
          description: Business not found
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                BUSINESS_NOT_FOUND:
                  summary: "1006 - business does not exist"
                  value:
                    status: 404
                    detail: "1006 - business does not exist"
      x-functional-errors:
        - 1006
        - 1020

  get-worklogs:
    get:
      summary: Get user worklogs
      description: Retrieves a collection of worklog records for the authenticated user.
      tags:
        - Worklogs
      operationId: getUserWorklogs
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          required: false
          description: Start date for filtering (format YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2025-07-22"
        - name: to
          in: query
          required: false
          description: End date for filtering (format YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2025-07-28"
        - name: date
          in: query
          required: false
          description: Specific date for filtering (alternative to from/to, format YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2025-07-29"
        - name: businessId
          in: query
          required: false
          description: Filter by business ID
          schema:
            type: integer
            format: int64
            example: 123
      responses:
        '200':
          description: Worklogs retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../../components/worklogs/components.yml#/components/schemas/WorkLogResponseDTO'
        '401':
          description: Unauthorized

  get-modify-worklog:
    get:
      summary: Get worklog by ID
      description: Retrieves a specific worklog by its unique identifier.
      tags:
        - Worklogs
      operationId: getWorklogById
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: worklogId
          in: path
          required: true
          description: ID of the worklog to retrieve
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Worklog retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../../components/worklogs/components.yml#/components/schemas/WorkLogResponseDTO'
        '401':
          description: Unauthorized
        '403':
          description: User is not the owner of the worklog
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                WORKLOG_NOT_OWNER:
                  summary: "1019 - user is not the owner of worklog"
                  value:
                    status: 403
                    detail: "1019 - user is not the owner of worklog"
        '404':
          description: Worklog not found
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                WORKLOG_NOT_FOUND:
                  summary: "1017 - worklog not found"
                  value:
                    status: 404
                    detail: "1017 - worklog not found"
      x-functional-errors:
        - 1017
        - 1019

    put:
      summary: Update worklog
      description: Updates the clock-in and clock-out times for a specific worklog.
      tags:
        - Worklogs
      operationId: updateWorklog
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: worklogId
          in: path
          required: true
          description: ID of the worklog to update
          schema:
            type: integer
            format: int64
      requestBody:
        description: Updated clock-in and clock-out information
        content:
          application/json:
            schema:
              $ref: '../../components/worklogs/components.yml#/components/schemas/WorkLogUpdateRequestDTO'
        required: true
      responses:
        '200':
          description: Worklog updated successfully
          content:
            application/json:
              schema:
                $ref: '../../components/worklogs/components.yml#/components/schemas/WorkLogResponseDTO'
        '400':
          description: Worklog times are invalid (e.g. clock-out before clock-in)
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                WORKLOG_NOT_VALID:
                  summary: "1025 - worklog is not valid"
                  value:
                    status: 400
                    detail: "1025 - worklog is not valid"
        '401':
          description: Unauthorized
        '403':
          description: User is not the owner of the worklog
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                WORKLOG_NOT_OWNER:
                  summary: "1019 - user is not the owner of worklog"
                  value:
                    status: 403
                    detail: "1019 - user is not the owner of worklog"
        '404':
          description: Worklog not found
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                WORKLOG_NOT_FOUND:
                  summary: "1017 - worklog not found"
                  value:
                    status: 404
                    detail: "1017 - worklog not found"
        '409':
          description: Updated worklog overlaps with an existing worklog
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                WORKLOG_OVERLAP:
                  summary: "1022 - worklog overlaps with existing worklog"
                  value:
                    status: 409
                    detail: "1022 - worklog overlaps with existing worklog"
      x-functional-errors:
        - 1017
        - 1019
        - 1022
        - 1025
