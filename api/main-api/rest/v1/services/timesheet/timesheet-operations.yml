timesheet:
  weekly-hours:
    get:
      summary: Get weekly hours report
      description: |
        Generates and retrieves a comprehensive weekly hours report for users within a specified business.

        **Deprecated:** Use `GET /api/v1/businesses/{businessId}/reports` instead, which provides flexible date-range filtering and machine-friendly seconds values.
      deprecated: true
      tags:
        - Timesheet
      operationId: getWeeklyHoursReport
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          description: ID of the business to filter by
          schema:
            type: integer
            example: 123
        - name: week
          in: query
          required: true
          description: ISO week format (YYYY-Www)
          schema:
            type: string
            pattern: '^\d{4}-W\d{2}$'
            example: "2025-W31"
        - name: userId
          in: query
          required: false
          description: ID of the user to filter by
          schema:
            type: integer
            example: 12
      responses:
        '200':
          description: Weekly hours report retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../../components/timesheet/components.yml#/components/schemas/WeeklyHoursResponseDTO'
            text/csv:
              schema:
                type: string
        '400':
          description: Invalid request parameters
        '401':
          description: Unauthorized
        '404':
          description: No data found for the specified parameters
  user-weekly-hours:
    get:
      summary: Get current user's weekly hours report
      description: |
        Retrieves the weekly hours report for the authenticated user.

        **Deprecated:** Use `GET /api/v1/reports` instead, which provides flexible date-range filtering and machine-friendly seconds values.
      deprecated: true
      tags:
        - Timesheet
      operationId: getCurrentUserWeeklyHoursReport
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: week
          in: query
          required: true
          description: ISO week format (YYYY-Www)
          schema:
            type: string
            pattern: '^\d{4}-W\d{2}$'
            example: "2025-W31"
        - name: businessId
          in: query
          required: true
          description: ID of the business to filter
          schema:
            type: integer
            example: 12
      responses:
        '200':
          description: Weekly hours report retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../../components/timesheet/components.yml#/components/schemas/WeeklyHoursResponseDTO'
            text/csv:
              schema:
                type: string
        '400':
          description: Invalid request parameters
        '401':
          description: Unauthorized
        '404':
          description: No data found for the specified parameters
