invitations:
  register-user-from-invitation:
    post:
      summary: Register user from invitation
      description: Registers a new user an accepts the invitation.
      tags:
        - Invitations
      operationId: registerUserFromInvitation
      security: []
      parameters:
        - name: token
          in: query
          required: true
          description: Token from the invitation email to validate the user registration
          schema:
            type: string
            pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
      requestBody:
        description: Registration details for the new user
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/invitations/components.yml#/components/schemas/RegisterUserFromInvitationRequestDTO'
            example:
              username: "johndoe"
              phone: "+1234567890"
              password: "securePassword123"
      responses:
        '201':
          description: User registered successfully
        '403':
          description: Invitation expired
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                INVITATION_EXPIRED:
                  summary: "1010 - invitation expired"
                  value:
                    status: 403
                    detail: "1010 - invitation expired"
        '404':
          description: Invitation token not found
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                INVITATION_NOT_FOUND:
                  summary: "1005 - invitation not found"
                  value:
                    status: 404
                    detail: "1005 - invitation not found"
        '409':
          description: User is already registered
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                USER_ALREADY_ENABLED:
                  summary: "1014 - user already enabled"
                  value:
                    status: 409
                    detail: "1014 - user already enabled"
      x-functional-errors:
        - 1005
        - 1010
        - 1014

  accept-invitation:
    post:
      summary: Accept an invitation
      description: Accepts an invitation to join a business using a token.
      tags:
        - Invitations
      operationId: acceptInvitation
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      parameters:
        - name: token
          in: query
          required: true
          description: Token to validate the invitation
          schema:
            type: string
            pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
      responses:
        '200':
          description: Invitation accepted successfully
        '403':
          description: Invitation cannot be accepted by the current user or has expired
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                INVITATION_NOT_FOR_CURRENT_USER:
                  summary: "1009 - invitation not for current user"
                  value:
                    status: 403
                    detail: "1009 - invitation not for current user"
                INVITATION_EXPIRED:
                  summary: "1010 - invitation expired"
                  value:
                    status: 403
                    detail: "1010 - invitation expired"
        '404':
          description: Invitation token not found
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                INVITATION_NOT_FOUND:
                  summary: "1005 - invitation not found"
                  value:
                    status: 404
                    detail: "1005 - invitation not found"
      x-functional-errors:
        - 1005
        - 1009
        - 1010

  get-and-create-invitations:
    post:
      summary: Create a business invitation
      description: Creates a new invitation to join a business with a specified role.
      tags:
        - Invitations
      operationId: createBusinessInvitation
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          description: Unique identifier of the business
          schema:
            type: integer
      requestBody:
        description: Invitation details
        required: true
        content:
          application/json:
            schema:
              $ref: '../../components/invitations/components.yml#/components/schemas/InvitationRequestDTO'
            example:
              email: "invitee@example.com"
              role: "MANAGER"
      responses:
        '201':
          description: Invitation created successfully
          content:
            application/json:
              schema:
                $ref: '../../components/invitations/components.yml#/components/schemas/InvitationResponseDTO'
              example:
                id: 123
                email: "invitee@example.com"
                role: "MANAGER"
                status: "PENDING"
                createdAt: "2023-06-15T14:30:00+00:00"
                expiresAt: "2023-06-22T14:30:00+00:00"
        '401':
          description: Unauthorized
        '403':
          description: Current user is not the owner of the business
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                USER_INVITATION_NOT_OWNER:
                  summary: "1011 - user not authorized for invitation"
                  value:
                    status: 403
                    detail: "1011 - user not authorized for invitation"
        '404':
          description: Business not found
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                BUSINESS_NOT_FOUND:
                  summary: "1006 - business does not exist"
                  value:
                    status: 404
                    detail: "1006 - business does not exist"
        '409':
          description: User is already a member or already has a pending invitation
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                USER_ALREADY_MEMBER_OF_BUSINESS:
                  summary: "1007 - user already member of business"
                  value:
                    status: 409
                    detail: "1007 - user already member of business"
                INVITATION_ALREADY_EXISTS:
                  summary: "1008 - user is already invited to this business"
                  value:
                    status: 409
                    detail: "1008 - user is already invited to this business"
      x-functional-errors:
        - 1006
        - 1007
        - 1008
        - 1011
    get:
      summary: Get invitations for a business
      description: Retrieves a list of all pending invitations for the specified business.
      tags:
        - Invitations
      operationId: getBusinessInvitations
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      parameters:
        - name: businessId
          in: path
          required: true
          description: Unique identifier of the business
          schema:
            type: integer
        - name: status
          in: query
          required: false
          description: Filter invitations by status
          schema:
            type: string
            enum: [ PENDING, ACCEPTED, DECLINED, EXPIRED ]
      responses:
        '200':
          description: Invitations retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../../components/invitations/components.yml#/components/schemas/InvitationResponseDTO'
              example:
                - id: 123
                  email: "invitee@example.com"
                  role: "MANAGER"
                  status: "PENDING"
                  createdAt: "2023-06-15T14:30:00+00:00"
                  expiresAt: "2023-06-22T14:30:00+00:00"
                - id: 124
                  email: "another@example.com"
                  role: "EMPLOYEE"
                  status: "PENDING"
                  createdAt: "2023-06-16T10:15:00+00:00"
                  expiresAt: "2023-06-23T10:15:00+00:00"
        '401':
          description: Unauthorized
        '403':
          description: Current user is not the owner of the business
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                USER_INVITATION_NOT_OWNER:
                  summary: "1011 - user not authorized for invitation"
                  value:
                    status: 403
                    detail: "1011 - user not authorized for invitation"
        '404':
          description: Business not found
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                BUSINESS_NOT_FOUND:
                  summary: "1006 - business does not exist"
                  value:
                    status: 404
                    detail: "1006 - business does not exist"
      x-functional-errors:
        - 1006
        - 1011

  delete-business-invitation:
    delete:
      summary: Delete a business invitation
      description: Deletes an existing invitation to join a business.
      tags:
        - Invitations
      operationId: deleteBusinessInvitation
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          description: Unique identifier of the business
          schema:
            type: integer
        - name: invitationId
          in: path
          required: true
          description: Unique identifier of the invitation
          schema:
            type: integer
      responses:
        '204':
          description: Invitation deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Current user is not the owner or invitation is not in a deletable state
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                USER_INVITATION_NOT_OWNER:
                  summary: "1011 - user not authorized for invitation"
                  value:
                    status: 403
                    detail: "1011 - user not authorized for invitation"
                INVITATION_NOT_PENDING:
                  summary: "1013 - invitation not pending"
                  value:
                    status: 403
                    detail: "1013 - invitation not pending"
        '404':
          description: Business or invitation not found
          content:
            application/problem+json:
              schema:
                $ref: '../../components/common/error-components.yml#/components/schemas/ProblemDetail'
              examples:
                BUSINESS_NOT_FOUND:
                  summary: "1006 - business does not exist"
                  value:
                    status: 404
                    detail: "1006 - business does not exist"
                INVITATION_NOT_FOUND:
                  summary: "1005 - invitation not found"
                  value:
                    status: 404
                    detail: "1005 - invitation not found"
      x-functional-errors:
        - 1005
        - 1006
        - 1011
        - 1013

  get-invitations:
    get:
      summary: Get invitations for user
      description: Retrieves a list of all invitations for the currently authenticated user.
      tags:
        - Invitations
      operationId: getUserInvitations
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      parameters:
        - name: status
          in: query
          required: false
          description: Filter invitations by status
          schema:
            type: string
            enum: [ PENDING, ACCEPTED, DECLINED, EXPIRED ]
      responses:
        '200':
          description: Invitations retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../../components/invitations/components.yml#/components/schemas/InvitationResponseDTO'
              example:
                - id: 123
                  email: "invitee@example.com"
                  role: "MANAGER"
                  status: "PENDING"
                  createdAt: "2023-06-15T14:30:00+00:00"
                  expiresAt: "2023-06-22T14:30:00+00:00"
                - id: 124
                  email: "another@example.com"
                  role: "EMPLOYEE"
                  status: "PENDING"
                  createdAt: "2023-06-16T10:15:00+00:00"
                  expiresAt: "2023-06-23T10:15:00+00:00"
        '401':
          description: Unauthorized
